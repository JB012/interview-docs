<div class="flex flex-col w-full h-full p-4">
    <div id="AddQuestion" class="flex pt-40 pb-10 xs:justify-center xxs:justify-between gap-4 items-start">
        <div class="flex wrap flex-col gap-2 xxs:w-52 xs:w-77 sm:w-102">
            <input id="add-question" class="xxs:w-50 xs:w-75 sm:w-100 px-2 rounded-full outline outline-black" placeholder="Add question here..." />
            <folder-search />
        </div>
        <button matButton="filled">Add</button>
    </div>
    <div id="menus" class="flex justify-end gap-4">
        <menu-button class="py-2" />
    </div>
    <ul id="questions-list" style="background-color: rgb(205, 207, 192)" class="xxs:h-80">
        <div class="text-lg p-2">Questions</div>
        <question id="1" question="What makes you want to work here?"/>
    </ul>
    <mat-paginator
        [hidePageSize]="true"
        [length]="1"
        [pageSize]="1"
        [pageIndex]="0"
    ></mat-paginator>
</div>
