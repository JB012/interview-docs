<div class="flex flex-col w-full h-full p-4">
    <header class="flex justify-between w-full">
        <div class="flex gap-4">
            <span id="menu" class="material-symbols-outlined">&#xe5d2;</span>
            <span id="logo" class="material-symbols-outlined">&#xef42;</span>
        </div>
        <div class="flex gap-16 xs:gap-8 items-center">
            <div class="xxs:hidden xs:block">Session Mode</div>
            <button matButton="filled">Log In</button>
        </div>
    </header>
    <div id="AddQuestion" class="flex pt-40 pb-10 xs:justify-center xxs:justify-between gap-4 items-start">
        <div class="flex flex-col gap-2">
            <input id="add-question" class="xxs:w-50 xs:w-75 sm:w-100 px-2 rounded-full outline outline-black" placeholder="Add question here..." />
            <span class="material-symbols-outlined">&#xe2c7;</span>
        </div>
        <button matButton="filled">Add</button>
    </div>
    <ul id="questions-list" style="background-color: rgb(205, 207, 192)" class="xxs:h-80">
        <li class="flex justify-between">
        <div class="truncate cursor-pointer p-4 w-full hover:backdrop-brightness-97">
            What makes you want to work here?
        </div>
        </li>
    </ul>
    <mat-paginator
        [hidePageSize]="true"
        [length]="1"
        [pageSize]="1"
        [pageIndex]="0"
    ></mat-paginator>
</div>
