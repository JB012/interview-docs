<div class="flex flex-col w-full h-full justify-center">
    <div class="flex relative">
        <div class="relative">
            <video class="video" #video autoplay></video>
            <video-controls class="flex w-full absolute z-10 bottom-0"/>
        </div>
    </div>
  <span class="m-1"></span>
  <video class="video" style="width:360 !important;" controls #recordedVideo></video>
  <br>
  @if (!isRecording) {
     <button class="btn btn-primary btn-lg" (click)="startRecording()">Start Recording</button>
  }
  @else {
    <button class="btn btn-warning btn-lg" (click)="stopRecording()">Stop Recording</button>
  }
</div>
