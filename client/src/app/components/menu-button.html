<div class="flex flex-col relative gap-2">
    <div id="menu-button" (click)="updateMenuView()" class="flex gap-4 rounded-full outline px-2 hover:backdrop-brightness-95 cursor-pointer">    
        <div>{{title()}}</div>
        <span class="material-symbols-outlined">&#xe313;</span>
    </div>
    @if (menuOpened()) {
        <div appClickOutside (clickOutside)="onClickOutside()" class="absolute top-6 flex flex-col bg-[#FDF9F0] rounded-2xl p-3">
        <div id="title()-sort-options" class="flex flex-col w-full">
            <div class="text-gray-500 self-center">Sort By</div>
            <div class="flex hover:bg-sky-400 cursor-pointer rounded-md">
                <span class="material-symbols-outlined">&#xf88b;</span>
                <div>Alphabetical</div>
            </div>
            <div class="flex hover:bg-sky-400 cursor-pointer rounded-md">
                <div class="pl-5"></div>
                <div>Date created</div>
            </div>
        </div>
        <div class="py-2"><hr/></div>
        <div id="title()-order-options" class="flex flex-col w-full">
            <div class="self-center">Order</div>
                <div class="flex hover:bg-sky-400 cursor-pointer rounded-md">
                    <span class="material-symbols-outlined">&#xf88b;</span>
                    <div>Z-A</div>
                </div>
                <div class="flex hover:bg-sky-400 cursor-pointer rounded-md">
                    <div class="pl-6"></div>
                    <div>A-Z</div>
                </div>
            </div>
    </div>
    }
</div>
